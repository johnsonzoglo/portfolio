<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#090a0f"><title>Owner Dashboard — JZ Market</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Mono:wght@300;400;500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="admin.css"></head><body class="admin-page"><section class="admin-login" id="loginView"><form id="loginForm"><a class="brand" href="index.html"><span>JZ</span><i>OWNER</i></a><p class="overline">Private dashboard</p><h1>WELCOME<br>BACK.</h1><label>Admin password<input id="password" type="password" required autofocus></label><p id="loginMessage"></p><button type="submit">Open dashboard ↗</button><small>Local starter password: <code>admin123</code>. Change it before publishing.</small></form></section><div class="dashboard" id="dashboard"><aside class="admin-nav"><a class="brand" href="index.html"><span>JZ</span><i>OWNER</i></a><nav><button class="tab active" data-tab="products">Products</button><button class="tab" data-tab="orders">Orders <span id="newOrders">0</span></button></nav><div><a href="shop.html" target="_blank">View market ↗</a><button id="logout">Sign out</button></div></aside><main class="admin-main"><header><div><p class="overline">JZ Market management</p><h1 id="viewTitle">PRODUCTS</h1></div><button class="new-product" id="newProduct">＋ Add product</button></header><section id="productsView"><div class="admin-stats"><div><span id="productTotal">0</span><small>Products</small></div><div><span id="stockTotal">0</span><small>Items in stock</small></div><div><span id="lowStock">0</span><small>Low stock</small></div></div><div class="data-table" id="productsTable"></div></section><section id="ordersView" hidden><div class="admin-stats"><div><span id="orderTotal">0</span><small>Orders</small></div><div><span id="pendingTotal">0</span><small>Open orders</small></div><div><span id="salesTotal">$0</span><small>Order value</small></div></div><div class="order-list" id="ordersList"></div></section></main></div><div class="editor" id="editor" aria-hidden="true"><form id="productForm"><div class="editor-top"><div><small>INVENTORY</small><h2 id="editorTitle">Add product</h2></div><button type="button" id="editorClose">×</button></div><input type="hidden" id="productId"><div class="editor-grid"><label>Product name<input id="productName" required maxlength="100"></label><label>Category<select id="productCategory"><option>phones</option><option>laptops</option><option>games</option><option>cars</option><option>gadgets</option><option>fashion</option><option>home</option><option>other</option></select></label><label>Price (USD)<input id="productPrice" type="number" min="0" step="0.01" required></label><label>Stock quantity<input id="productStock" type="number" min="0" step="1" required></label><label>Condition<select id="productCondition"><option value="new">New</option><option value="used">Used</option><option value="refurbished">Refurbished</option></select></label><label class="toggle">Visible in shop<input id="productActive" type="checkbox" checked></label></div><label>Description<textarea id="productDescription" rows="3" maxlength="500"></textarea></label><label class="photo-field">Product photo<input id="productPhoto" type="file" accept="image/png,image/jpeg,image/webp"><span id="photoName">Choose PNG, JPEG, or WebP under 5MB</span></label><input type="hidden" id="productImage"><p id="editorMessage"></p><button class="save-product" type="submit">Save product <span>↗</span></button></form></div><div class="editor-overlay" id="editorOverlay"></div><script src="admin.js"></script></body></html>
